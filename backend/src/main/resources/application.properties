spring.application.name=knust-classmate-backend

server.port=8080
server.servlet.context-path=/api

spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Allow assignment/timetable document uploads up to 25 MB.
spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=25MB

app.jwt.secret=${JWT_SECRET:classmate-secret-key-change-this-in-production}
app.jwt.expiration-ms=86400000

# Paystack secret key — server-side only, never sent to the frontend. Empty by
# default so the app still starts without it; PaystackClient rejects calls with
# a clear error until it's set (see PaystackClient.ensureConfigured()).
paystack.secret-key=${PAYSTACK_SECRET_KEY:}

# Absolute base URL of this backend (including the /api context path), used to
# build the Paystack checkout callback_url. Must be a real https URL in
# production for Paystack to redirect the browser back to something valid.
app.base-url=${APP_BASE_URL:http://localhost:8080/api}
# Neon closes idle connections; retire pooled connections before that happens
# and keep them alive so requests don't get handed a dead connection.
spring.datasource.hikari.max-lifetime=240000
spring.datasource.hikari.idle-timeout=120000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.keepalive-time=120000
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.maximum-pool-size=5